<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=375, initial-scale=1" />
  <title>Preview conductor — lista + detalle 375px</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 375px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #eef2f7;
    }
    .screen { padding: 12px; margin-bottom: 8px; }
    .screen-title {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .card {
      position: relative;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px 14px 14px 16px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: #2563eb; }
    .row { display: flex; gap: 12px; align-items: flex-start; }
    .icon { font-size: 24px; margin-left: 2px; flex-shrink: 0; }
    .content { flex: 1; min-width: 0; }
    .header { display: flex; flex-direction: column; gap: 6px; min-width: 0; width: 100%; }
    .title { font-size: 16px; font-weight: 800; color: #0f172a; line-height: 1.25; white-space: nowrap; }
    .pills { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; max-width: 100%; }
    .pill-trip {
      display: inline-block; max-width: 100%; font-size: 10px; font-weight: 800;
      padding: 3px 8px; border-radius: 999px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; color: #1e40af; background: #dbeafe;
      border: 1px solid rgba(37, 99, 235, 0.33);
    }
    .pill-status {
      font-size: 12px; font-weight: 800; padding: 5px 10px; border-radius: 999px;
      white-space: nowrap; color: #64748b; background: #f1f5f9; border: 1px solid #e2e8f0;
    }
    .subtitle {
      font-size: 13px; color: #64748b; line-height: 1.45; font-weight: 600;
      word-break: normal; overflow-wrap: break-word;
    }
    .actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-primary {
      flex: 2; background: #15803d; color: #fff; border: none; border-radius: 12px;
      padding: 14px 10px; font-size: 15px; font-weight: 800;
    }
    .btn-secondary {
      flex: 1; background: #fff; color: #64748b; border: 1px solid #e2e8f0;
      border-radius: 12px; padding: 14px 8px; font-size: 12px; font-weight: 700;
    }
    /* Detalle */
    .sticky-header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 14px 14px;
      border-left: 4px solid #2563eb;
    }
    .header-row { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .btn-back {
      flex-shrink: 0; background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 9px 12px; font-size: 13px; font-weight: 800; white-space: nowrap;
    }
    .quick-bar { display: flex; gap: 8px; margin-top: 12px; }
    .quick-btn {
      flex: 1; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 10px; font-size: 12px; font-weight: 700; color: #0f172a; text-align: center;
    }
    .ops-card {
      background: #fffbeb; border: 1px solid #fcd34d; border-radius: 16px;
      padding: 12px 12px 13px 14px; margin: 14px;
      box-shadow: 0 4px 18px rgba(180, 83, 9, 0.08);
    }
    .ops-row { display: flex; gap: 11px; align-items: flex-start; }
    .ops-icon {
      width: 40px; height: 40px; border-radius: 12px; background: #f1f5f9;
      border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .ops-body { flex: 1; min-width: 0; }
    .ops-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .badge-pendiente {
      background: #f1f5f9; color: #64748b; border-radius: 999px; padding: 4px 9px;
      font-size: 10px; font-weight: 800; white-space: nowrap;
    }
    .btn-muelle {
      width: 100%; background: #15803d; color: #fff; border: none; border-radius: 12px;
      padding: 14px; font-size: 15px; font-weight: 800; margin-top: 8px;
    }
    .detail-lines { margin-top: 10px; }
    .detail-line1 { font-size: 13px; color: #0f172a; font-weight: 700; line-height: 1.35; }
    .detail-line2 { font-size: 13px; color: #64748b; margin-top: 2px; line-height: 1.35; }
    .detail-line3 { font-size: 12px; color: #94a3b8; margin-top: 2px; line-height: 1.3; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="screen-title">Lista de paradas — 375px</div>
    <article class="card">
      <div class="stripe" aria-hidden="true"></div>
      <div class="row">
        <span class="icon" aria-hidden="true">📦</span>
        <div class="content">
          <div class="header">
            <div class="title">Carga 1</div>
            <div class="pills">
              <span class="pill-trip">XTR-VIAJE26-0001</span>
              <span class="pill-status">Pendiente</span>
            </div>
            <div class="subtitle">Almacén Torrecillas · Almería</div>
          </div>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="btn-primary">EMPEZAR</button>
        <button type="button" class="btn-secondary">Ver detalles</button>
      </div>
    </article>
    <article class="card">
      <div class="stripe" aria-hidden="true" style="background:#ea580c"></div>
      <div class="row">
        <span class="icon" aria-hidden="true">📤</span>
        <div class="content">
          <div class="header">
            <div class="title">Descarga 1</div>
            <div class="pills">
              <span class="pill-trip">XTR-VIAJE26-0001</span>
              <span class="pill-status">Pendiente</span>
            </div>
            <div class="subtitle">Destinatario 1 · La Morena</div>
          </div>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="btn-primary">EMPEZAR</button>
        <button type="button" class="btn-secondary">Ver detalles</button>
      </div>
    </article>
  </div>

  <div class="screen" style="padding:0;background:#f8fafc">
    <div class="screen-title" style="padding:12px 12px 0">Detalle de parada — 375px</div>
    <div class="sticky-header">
      <div class="header-row">
        <div class="header" style="flex:1">
          <div class="title" style="font-size:17px">Descarga 1</div>
          <div class="pills"><span class="pill-trip">XTR-VIAJE26-0001</span></div>
        </div>
        <button type="button" class="btn-back">← Volver</button>
      </div>
      <div class="quick-bar">
        <div class="quick-btn">DeCA</div>
        <div class="quick-btn">Chat</div>
      </div>
    </div>
    <article class="ops-card">
      <div class="ops-row">
        <div class="ops-icon">📤</div>
        <div class="ops-body">
          <div class="ops-top">
            <div style="flex:1"></div>
            <span class="badge-pendiente">Pendiente</span>
          </div>
          <button type="button" class="btn-muelle">Entrada a muelle</button>
          <div class="detail-lines">
            <div class="detail-line1">Destinatario 1</div>
            <div class="detail-line2">La Morena · CP 04120</div>
            <div class="detail-line3">La Morena, 10</div>
          </div>
        </div>
      </div>
    </article>
  </div>
</body>
</html>
